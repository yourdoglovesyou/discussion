name: Daily Frontend Question PR

on:
  schedule:
    # 00:05 UTC = 09:05 KST
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-daily-question-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily frontend question
        id: generate
        env:
          QUESTION_SOURCE_URL: ${{ vars.QUESTION_SOURCE_URL || 'https://www.maeil-mail.kr/question/mine/gentlemonster77@likelion.org?category=frontend' }}
          QUESTION_SOURCE_COOKIE: ${{ secrets.QUESTION_SOURCE_COOKIE || '' }}
          QUESTION_DB_PATH: daily-frontend-questions/db.json
          QUESTION_VARIATION_SALT: ${{ github.run_id }}-${{ github.run_attempt }}
          QUESTION_GENERATION_MODE: ${{ vars.QUESTION_GENERATION_MODE || 'always' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          GEMINI_REQUEST_TIMEOUT_SEC: ${{ vars.GEMINI_REQUEST_TIMEOUT_SEC || '60' }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES || '7' }}
        run: python scripts/generate_daily_question.py

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PR_BOT_TOKEN || github.token }}
          add-paths: daily-frontend-questions
          commit-message: "chore: add daily frontend question (${{ github.run_id }})"
          branch: "bot/daily-frontend-question"
          title: "${{ steps.generate.outputs.pr_title }}"
          body: |
            ## Today's Technical Question

            ${{ steps.generate.outputs.question }}

            <details>
            <summary>Detail</summary>

            - Track: `${{ steps.generate.outputs.track }}`
            - Category: `${{ steps.generate.outputs.category }}`
            - Follow-up 1: ${{ steps.generate.outputs.follow_up_1 }}
            - Follow-up 2: ${{ steps.generate.outputs.follow_up_2 }}
            - Reference hint: `${{ steps.generate.outputs.reference_hint }}`
            - Reference question: `${{ steps.generate.outputs.reference_question }}`
            </details>

            - File: `${{ steps.generate.outputs.file_path }}`
            - Source mode: `${{ steps.generate.outputs.source_mode }}`

            This PR was created by GitHub Actions.
          labels: |
            automated
            frontend-question
          delete-branch: true

      - name: Request Reviewers and Assign Assignees (Exclude Author)
        if: ${{ steps.cpr.outputs.pull-request-number }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_BOT_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number('${{ steps.cpr.outputs.pull-request-number }}');

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const author = String(pr.user.login || '').toLowerCase();
            const candidates = ['prgmr99', 'klmhyeonwoo', 'JaeIn1'];
            const reviewers = candidates.filter((u) => u.toLowerCase() !== author);

            if (reviewers.length === 0) {
              core.info('No eligible reviewers/assignees after excluding PR author.');
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number,
              reviewers,
            });
            core.info(`Requested reviewers: ${reviewers.join(', ')}`);

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: pull_number,
                assignees: reviewers,
              });
              core.info(`Assigned assignees: ${reviewers.join(', ')}`);
            } catch (err) {
              core.warning(`Failed to assign assignees: ${String(err.message || err)}`);
            }
