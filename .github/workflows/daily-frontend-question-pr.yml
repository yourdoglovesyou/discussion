name: Daily Frontend Question PR

on:
  schedule:
    # 00:05 UTC = 09:05 KST
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-daily-question-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily frontend question
        id: generate
        env:
          QUESTION_SOURCE_URL: ${{ vars.QUESTION_SOURCE_URL || 'https://www.maeil-mail.kr/question/mine/gentlemonster77@likelion.org' }}
          QUESTION_SOURCE_COOKIE: ${{ secrets.QUESTION_SOURCE_COOKIE || '' }}
        run: python scripts/generate_daily_question.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: daily-frontend-questions
          commit-message: "chore: add daily frontend question (${{ github.run_id }})"
          branch: "bot/daily-frontend-question"
          branch-suffix: timestamp
          title: "chore: frontend daily question - ${{ steps.generate.outputs.file_path }}"
          body: |
            Daily frontend question generated automatically.

            - File: `${{ steps.generate.outputs.file_path }}`
            - Source mode: `${{ steps.generate.outputs.source_mode }}`
            - Question: `${{ steps.generate.outputs.question }}`

            This PR was created by GitHub Actions.
          labels: |
            automated
            frontend-question
          delete-branch: true
